---
services:
  mysql:
    image: mysql:8.4
    container_name: babbel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: babbel
      MYSQL_USER: babbel
      MYSQL_PASSWORD: babbel
      TZ: Europe/Amsterdam
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./migrations/001_complete_schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    # Docker rotates the log files. Docker keeps a maximum of 3 files of 10 MB.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  babbel:
    build: .
    container_name: babbel-app
    environment:
      BABBEL_DB_HOST: mysql
      BABBEL_DB_USER: babbel
      BABBEL_DB_PASSWORD: babbel
      BABBEL_DB_NAME: babbel
      BABBEL_SERVER_ADDRESS: ":8080"
      BABBEL_AUTH_METHOD: local
      BABBEL_SESSION_SECRET: this-is-a-32-character-secret-key-for-testing
      BABBEL_ENV: development
      BABBEL_FFMPEG_PATH: "ffmpeg"
      BABBEL_FFPROBE_PATH: "ffprobe"
      # CORS is disabled by default. Enable for web frontend development:
      BABBEL_ALLOWED_ORIGINS: "http://localhost:3000,http://localhost:5173"
      # Cookie configuration (empty = default single domain cookies)
      BABBEL_COOKIE_DOMAIN: ""
      BABBEL_COOKIE_SAMESITE: "lax"
      # Radio automation API key (leave empty to disable public endpoint)
      BABBEL_AUTOMATION_KEY: "test-automation-key-for-integration-tests"
      # ElevenLabs TTS (leave empty to disable; endpoint returns 501 when unset)
      BABBEL_ELEVENLABS_API_KEY: ${BABBEL_ELEVENLABS_API_KEY:-}
      BABBEL_ELEVENLABS_TIMEOUT: ${BABBEL_ELEVENLABS_TIMEOUT:-60s}
      # Optional Microsoft Graph operational notifications
      BABBEL_NOTIFICATIONS_EMAIL_TENANT_ID: ${BABBEL_NOTIFICATIONS_EMAIL_TENANT_ID:-}
      BABBEL_NOTIFICATIONS_EMAIL_CLIENT_ID: ${BABBEL_NOTIFICATIONS_EMAIL_CLIENT_ID:-}
      BABBEL_NOTIFICATIONS_EMAIL_CLIENT_SECRET: ${BABBEL_NOTIFICATIONS_EMAIL_CLIENT_SECRET:-}
      BABBEL_NOTIFICATIONS_EMAIL_FROM_ADDRESS: ${BABBEL_NOTIFICATIONS_EMAIL_FROM_ADDRESS:-}
      BABBEL_NOTIFICATIONS_EMAIL_RECIPIENTS: ${BABBEL_NOTIFICATIONS_EMAIL_RECIPIENTS:-}
      BABBEL_NOTIFICATIONS_COOLDOWN: ${BABBEL_NOTIFICATIONS_COOLDOWN:-1h}
      BABBEL_NOTIFICATIONS_FAILURE_THRESHOLD: ${BABBEL_NOTIFICATIONS_FAILURE_THRESHOLD:-3}
      BABBEL_NOTIFICATIONS_FAILURE_WINDOW: ${BABBEL_NOTIFICATIONS_FAILURE_WINDOW:-10m}
      TZ: Europe/Amsterdam
    ports:
      - "8080:8080"
    volumes:
      - babbel_uploads:/app/uploads
      - ./audio:/app/audio
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped
    # Babbel writes the log data to stdout. Docker rotates the log files.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mysql_data:
  babbel_uploads:
