---
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version without v prefix (e.g., 1.0.0) or "edge" for development build'
        required: true
        default: '1.0.0'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      is_release: ${{ steps.version.outputs.is_release }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Set version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ "$REF_TYPE" = "tag" ]; then
            echo "version=$REF_NAME" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          elif [ "$INPUT_VERSION" = "edge" ]; then
            echo "version=edge" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            TAG="v$INPUT_VERSION"
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create git tag (manual release)
        if: github.event_name == 'workflow_dispatch' && steps.version.outputs.is_release == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse -q --verify "refs/tags/$VERSION" >/dev/null; then
            echo "Tag $VERSION already exists; reusing it for the release."
          else
            git tag "$VERSION"
            git push origin "refs/tags/$VERSION"
          fi

      - name: Test
        run: |
          go mod download
          go test -race -shuffle=on -v ./...
          go vet ./...

      - name: Build binaries
        env:
          VERSION: ${{ steps.version.outputs.version }}
          COMMIT: ${{ github.sha }}
        run: |
          if [ "$VERSION" = "edge" ]; then
            VERSION="edge-$(git rev-parse --short HEAD)"
          fi
          BUILD_TIME=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-w -s -X github.com/oszuidwest/zwfm-babbel/pkg/version.Version=$VERSION -X github.com/oszuidwest/zwfm-babbel/pkg/version.Commit=$COMMIT -X github.com/oszuidwest/zwfm-babbel/pkg/version.BuildTime=$BUILD_TIME"

          build() {
            local os=$1 arch=$2
            local output="babbel-${os}-${arch}"
            echo "Building $output"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -ldflags="$LDFLAGS" -o "dist/$output" ./cmd/babbel
          }

          mkdir -p dist

          build linux amd64
          build linux arm64
          build darwin amd64
          build darwin arm64

      - name: Create release
        if: steps.version.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          body: |
            ## Installation

            **Docker (recommended)**:
            ```bash
            docker pull ghcr.io/oszuidwest/zwfm-babbel:${{ steps.version.outputs.version }}
            ```

            **Binary**: Download below. Requires FFmpeg and MySQL.
          files: dist/*
          generate_release_notes: true
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}

      - name: Upload edge artifacts
        if: steps.version.outputs.is_release == 'false'
        uses: actions/upload-artifact@v7
        with:
          name: babbel-edge-${{ github.sha }}
          path: dist/*
          retention-days: 7

  docker:
    needs: release
    if: needs.release.outputs.is_release == 'true' && needs.release.result == 'success'
    uses: ./.github/workflows/docker-publish.yml
    with:
      version: ${{ needs.release.outputs.version }}
    permissions:
      contents: read
      packages: write
