---
# Thin shim — delegates to oszuidwest/.github-templates go-release.yml@v1.
# enable-docker: true triggers transitive docker-publish.yml@v1 for releases.
# The `body` job exists only to compute the v-stripped version for the
# `docker pull` line in release notes (GitHub Actions expressions can't slice).
name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (edge, vX.Y.Z, or X.Y.Z auto-prefixed)'
        required: true
        default: 'edge'

permissions:
  contents: read

jobs:
  body:
    runs-on: ubuntu-latest
    outputs:
      text: ${{ steps.compute.outputs.text }}
    steps:
      - id: compute
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${INPUT_VERSION:-$REF_NAME}"
          VERSION_NO_V="${VERSION#v}"
          {
            echo 'text<<RELEASE_BODY_EOF'
            echo '## Installation'
            echo ''
            echo '**Docker (recommended)**:'
            echo '```bash'
            echo "docker pull ghcr.io/oszuidwest/zwfm-babbel:${VERSION_NO_V}"
            echo '```'
            echo ''
            echo '**Binary**: Download below. Requires FFmpeg and MySQL.'
            echo 'RELEASE_BODY_EOF'
          } >> "$GITHUB_OUTPUT"

  release:
    needs: body
    uses: oszuidwest/.github-templates/.github/workflows/go-release.yml@v1
    with:
      project-name: babbel
      ldflags-target: github.com/oszuidwest/zwfm-babbel/pkg/version
      main-package: ./cmd/babbel
      build-matrix: >-
        [{"os":"linux","arch":"amd64"},
         {"os":"linux","arch":"arm64"},
         {"os":"darwin","arch":"amd64"},
         {"os":"darwin","arch":"arm64"}]
      version: ${{ inputs.version }}
      enable-docker: true
      image-labels: |
        org.opencontainers.image.title=Babbel
        org.opencontainers.image.description=Audio bulletin API
        org.opencontainers.image.vendor=Streekomroep ZuidWest
        org.opencontainers.image.licenses=MIT
      release-body: ${{ needs.body.outputs.text }}
    permissions:
      contents: write
      packages: write
