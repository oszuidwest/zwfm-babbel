---
name: Build and Publish Docker Image

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to build (e.g., "v1.2.3")'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., "v1.2.3")'
        required: true
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # When run standalone (workflow_dispatch) with a version tag, check out that
      # tag so the image source matches the version label. When called from
      # release.yml, the workflow already runs at the tagged commit.
      - name: Check out version tag (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        env:
          VERSION: ${{ inputs.version }}
        run: git checkout "$VERSION"

      - name: Compute build time
        id: build_time
        run: echo "value=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # type=semver patterns extract from values starting with 'v' (e.g. v1.2.3 -> 1.2.3).
          # Pre-release tags (v1.0.0-rc1) only emit {{version}}; latest/major/minor are skipped.
          tags: |
            type=semver,pattern={{version}},value=${{ inputs.version }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.version }}
            type=semver,pattern={{major}},value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ !contains(inputs.version, '-') }}
          labels: |
            org.opencontainers.image.title=Babbel
            org.opencontainers.image.description=Audio bulletin generation API for radio automation
            org.opencontainers.image.vendor=Streekomroep ZuidWest
            org.opencontainers.image.licenses=MIT

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          pull: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          build-args: |
            VERSION=${{ inputs.version }}
            COMMIT=${{ github.sha }}
            BUILD_TIME=${{ steps.build_time.outputs.value }}
