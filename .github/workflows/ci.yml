---
# Hybrid: `go` delegates to go-ci.yml; `integration` stays inline (Node + compose + MySQL).
name: CI
permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  go:
    uses: oszuidwest/.github-templates/.github/workflows/go-ci.yml@v2
    with:
      golangci-lint-version: v2.12.1

  integration:
    name: Integration
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Amsterdam

    steps:
      - uses: actions/checkout@v7

      - name: Install FFmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Setup docker-compose compatibility
        # Symlink for docker-compose v1 callers.
        run: |
          sudo ln -sf /usr/libexec/docker/cli-plugins/docker-compose /usr/local/bin/docker-compose
          docker --version
          docker-compose --version

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: '24.x'
          cache: 'npm'

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Validate OpenAPI specification
        run: make validate-spec

      - name: Install Node.js dependencies
        run: npm ci

      - name: Run unit tests (offline, no Docker)
        run: npm run test:unit

      - name: Run complete tests
        run: |
          mkdir -p audio/{processed,output,temp,voices,stories}
          npm test || {
            echo "Test failed, showing debug info:"
            echo "Audio directory contents:"
            find audio -type f -ls || true
            echo "Docker logs:"
            docker-compose logs babbel || true
            docker-compose logs mysql || true
            exit 1
          }

      - name: Run Go integration tests
        env:
          BABBEL_TEST_DB_DSN: babbel:babbel@tcp(127.0.0.1:3306)/babbel?charset=utf8mb4&parseTime=True&loc=Local
        run: make test-integration
