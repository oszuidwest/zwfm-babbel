---
# Requires .hadolint.yaml at the repo root.
name: Docker Quality

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOCKERFILE_PATH: "Dockerfile"

jobs:
  lint:
    name: Lint Docker Files
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Check for Dockerfile
        id: check_dockerfile
        run: |
          if [ -f "${{ env.DOCKERFILE_PATH }}" ]; then
            echo "has_dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_dockerfile=false" >> "$GITHUB_OUTPUT"
          fi

      # Ignore rules live in .hadolint.yaml — do not duplicate here.
      - name: Hadolint
        if: steps.check_dockerfile.outputs.has_dockerfile == 'true'
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ${{ env.DOCKERFILE_PATH }}

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@v3.1.1
        with:
          # openapi.yaml is owned by OpenAPI tooling — skip.
          config_data: |
            ignore: |
              openapi.yaml
            extends: default
            rules:
              line-length:
                max: 120
                level: warning
              comments:
                min-spaces-from-content: 1
              truthy:
                allowed-values: ['true', 'false', 'on', 'off', 'yes', 'no']
              document-start:
                present: true

      - name: Check for Docker Compose
        id: check_compose
        run: |
          COMPOSE_FILES=""
          for f in docker-compose.yml docker-compose.yaml compose.yml compose.yaml; do
            if [ -f "$f" ]; then
              COMPOSE_FILES="$COMPOSE_FILES $f"
            fi
          done
          if [ -n "$COMPOSE_FILES" ]; then
            echo "has_compose=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_compose=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Docker Compose Validation
        if: steps.check_compose.outputs.has_compose == 'true'
        run: |
          if [ ! -f ".env" ]; then
            touch .env
          fi
          if ! OUTPUT=$(docker compose config --quiet 2>&1); then
            # Missing env vars: warn. Syntax errors: fail.
            if echo "$OUTPUT" | grep -qi "variable is not set"; then
              echo "::warning::Docker Compose validation requires environment variables: $OUTPUT"
            else
              echo "::error::Docker Compose validation failed: $OUTPUT"
              exit 1
            fi
          fi
